<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gusto - Tu Recetario Digital</title>
    <meta name="description" content="Guarda, busca y organiza tus recetas favoritas con Gusto. Tu cocina, tus reglas.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3565/3565418.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>

<body class="dark-theme">
    <!-- Hero Section -->
    <header class="landing-hero">
        <nav class="landing-nav glass">
            <a href="index.html" class="logo">
                <ion-icon name="restaurant"></ion-icon>
                <span>Gusto</span>
            </a>
            <a href="app.html" class="btn-primary">Entrar a mi recetario</a>
        </nav>
        <div class="hero-content">
            <h1>Tu cocina, tus reglas</h1>
            <p>Guarda, organiza y comparte tus recetas favoritas.</p>
            <a href="app.html" class="btn-primary btn-lg">
                <ion-icon name="restaurant-outline"></ion-icon>
                <span>Empezar ahora</span>
            </a>
        </div>
    </header>

    <!-- Public Recipes Section -->
    <section class="public-recipes-section" id="public-recipes">
        <div class="section-header">
            <h2>Recetas de la Comunidad</h2>
            <p>Explora recetas públicas compartidas por usuarios</p>
        </div>

        <!-- Search -->
        <div class="public-search-bar glass">
            <div class="search-container">
                <ion-icon name="search-outline"></ion-icon>
                <input type="text" id="public-search" placeholder="Buscar por nombre, ingrediente o tag...">
            </div>
        </div>

        <!-- Public Recipes Grid -->
        <div class="recipe-grid" id="public-recipe-grid">
            <div class="no-recipes">
                <ion-icon name="sad-outline"></ion-icon>
                <p>Cargando recetas...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="landing-footer">
        <p>&copy; 2026 Gusto - Tu recetario digital</p>
    </footer>

    <!-- View Recipe Modal -->
    <div id="public-view-modal" class="modal">
        <div class="modal-content glass detail-view">
            <div class="modal-header">
                <div class="header-actions-row">
                    <button type="button" class="close-modal btn-close-circle">
                        <ion-icon name="arrow-back-outline"></ion-icon>
                    </button>
                    <div class="header-main-actions">
                        <button id="public-share-btn" class="btn-icon circle">
                            <ion-icon name="share-social-outline"></ion-icon>
                        </button>
                    </div>
                    <button type="button" class="close-modal btn-close-circle">
                        <ion-icon name="close-outline"></ion-icon>
                    </button>
                </div>
            </div>
            <div id="public-recipe-details" class="details-body">
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="public.js"></script>
</body>

</html>
